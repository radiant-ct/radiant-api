services:
  db:
    image: postgres:18
    container_name: postgres18-radiant-db
    environment:
      POSTGRES_DB: radiant-db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  app:
    build: .
    container_name: radiant-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - backend
    restart: always
    volumes:
      - queue_data:/queue
      - image_data:/images

  worker:
    build:
      context: ./worker
      dockerfile: dockerfile
    container_name: radiant-worker
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_HOST: radiant-redis
      REDIS_PORT: 6379
      API_URL: http://radiant-api:8080
      QUEUE_PATH: /queue
      IMAGE_PATH: /images
    networks:
      - backend
    restart: always
    volumes:
      - queue_data:/queue
      - image_data:/images

  redis:
    image: redis:7-alpine
    container_name: radiant-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: radiant-nginx
    depends_on:
      - app
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - image_data:/images:ro
    networks:
      - backend
    restart: always

volumes:
  postgres_data:
  queue_data:
  image_data:
  redis_data:

networks:
  backend: